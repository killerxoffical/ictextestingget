<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Tournaments - ICTEX</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#0B0E14', surface: '#1A1F2A', surfaceLight: '#242B38',
                        ictexGreen: '#0CCF56', ictexBlue: '#007AFF', textDim: '#8BA0B8',
                        tourOrange: '#D9822B', cardBg: '#161A23', btnAreaBg: '#11151C', tourRed: '#E53935'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #0B0E14; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-btn, .inner-tab-btn { position: relative; transition: color 0.3s ease; }
        .tab-btn::after, .inner-tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background-color: #007AFF; transform: scaleX(0); transition: transform 0.3s ease;
            border-radius: 3px 3px 0 0;
        }
        .tab-btn.active, .inner-tab-btn.active { color: #007AFF; font-weight: 700; }
        .tab-btn.active::after, .inner-tab-btn.active::after { transform: scaleX(1); }
        
        .tab-content, .inner-tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active, .inner-tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .flag-icon { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        .avatar-icon { width: 16px; height: 16px; border-radius: 50%; background: #007AFF; display: flex; align-items: center; justify-content: center; font-size: 8px; margin-left: -6px; border: 1px solid #1A1F2A; z-index: 2;}
        
        /* Modal Animation */
        .modal-active { opacity: 1 !important; pointer-events: auto !important; }
        .modal-active > div { transform: scale(1) !important; }
    </style>
</head>
<body class="antialiased flex flex-col h-screen overflow-hidden">

    <!-- Custom Rebuy & Info Modal -->
    <div id="custom-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surfaceLight border border-white/10 rounded-2xl w-full max-w-sm p-6 shadow-2xl transform scale-95 transition-transform duration-300">
            <div id="custom-modal-icon" class="w-12 h-12 rounded-full flex items-center justify-center mb-4 mx-auto"></div>
            <h3 id="custom-modal-title" class="text-xl font-bold mb-2 text-center text-white">Notice</h3>
            <p id="custom-modal-message" class="text-textDim text-sm mb-6 leading-relaxed text-center"></p>
            <button onclick="closeCustomModal()" class="w-full py-3.5 rounded-lg bg-ictexBlue hover:bg-blue-600 text-white font-bold transition active:scale-95">OK, Got it</button>
        </div>
    </div>

    <!-- Prize Pool Distribution Modal -->
    <div id="prize-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surfaceLight border border-white/10 rounded-2xl w-full max-w-sm p-5 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-[17px] font-bold text-white flex items-center gap-2">
                    <svg class="w-5 h-5 text-ictexGreen" fill="currentColor" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.015 5.015 0 0 0 11 15.9V19H7v2h10v-2h-4v-3.1a5.015 5.015 0 0 0 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
                    Prize Distribution
                </h3>
                <button onclick="closePrizeModal()" class="text-textDim hover:text-white transition bg-white/5 p-1.5 rounded-lg border border-white/5">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex justify-between text-[11px] font-bold text-textDim uppercase tracking-wider mb-3 px-2"><span>Position</span><span>Prize</span></div>
            <div id="prize-modal-list" class="flex flex-col gap-2 overflow-y-auto hide-scrollbar pr-1"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-surface backdrop-blur-md border-b border-white/5 px-4 py-3 flex items-center justify-between shadow-lg z-50">
        <!-- Changed onclick function to postMessage -->
        <button onclick="window.parent.postMessage({ type: 'GO_BACK_FROM_TOURNAMENT' }, '*');" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 border border-white/5 text-white hover:bg-white/10 transition">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        </button>
        <h1 class="text-lg font-bold">Tournaments</h1>
        <div class="bg-surfaceLight px-3 py-1.5 rounded-lg border border-white/5 flex items-center gap-1">
            <span id="user-top-balance" class="font-bold text-sm">Loading...</span>
        </div>
    </header>

    <!-- VIEW 1: MAIN LIST -->
    <div id="view-main" class="flex-1 flex flex-col h-full overflow-hidden">
        <div class="flex bg-surface border-b border-white/5 px-2 shrink-0">
            <button class="tab-btn active flex-1 py-4 text-sm font-semibold text-textDim" data-target="tab-tournaments">Tournaments</button>
            <button class="tab-btn flex-1 py-4 text-sm font-semibold text-textDim" data-target="tab-joined">Joined</button>
            <button class="tab-btn flex-1 py-4 text-sm font-semibold text-textDim" data-target="tab-completed">Completed</button>
        </div>

        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 relative">
            <div id="tab-tournaments" class="tab-content active pb-10 min-h-full">
                <div id="loading-text" class="text-center text-textDim pt-20 animate-pulse">Fetching tournaments...</div>
                <div id="active-tour-list" class="flex flex-col gap-5"></div>
            </div>
            
            <div id="tab-joined" class="tab-content pb-10 min-h-full">
                <div id="joined-tour-list" class="flex flex-col gap-5"></div>
                <div id="empty-joined" class="hidden flex-col items-center justify-center pt-32 pb-10 text-center">
                    <svg class="w-12 h-12 opacity-20 mb-5 text-textDim" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>

            </div>

    <!-- VIEW 2: TOURNAMENT DETAILS -->
    <div id="view-details" class="hidden flex-1 flex flex-col h-full bg-bgDark overflow-hidden z-50 fixed inset-0">
        <div class="bg-surface px-4 py-4 shrink-0 shadow-md z-20">
            <button onclick="closeDetails()" class="flex items-center text-ictexBlue font-semibold gap-2 mb-4 hover:opacity-80">
                <div class="w-6 h-6 rounded-full bg-ictexBlue flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </div>
                Return back
            </button>
            <div class="flex border-b border-white/5">
                <button class="inner-tab-btn active flex-1 pb-3 text-sm font-semibold text-textDim uppercase tracking-wide" data-target="inner-info">INFO</button>
                <button class="inner-tab-btn flex-1 pb-3 text-sm font-semibold text-textDim uppercase tracking-wide" data-target="inner-prizes">LEADERBOARD</button>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto hide-scrollbar p-4 relative pb-20">
            <!-- INFO TAB -->
            <div id="inner-info" class="inner-tab-content active">
                
                <div class="rounded-xl border border-white/10 shadow-xl mb-6 bg-cardBg overflow-hidden flex flex-col" id="det-card-wrapper">
                    <div class="relative p-5 pb-8">
                        <div class="absolute inset-0 z-0">
                            <div class="absolute inset-0 bg-[url('https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Ictex/1776985962699_AddText_04_24_05.11.43.jpg')] bg-[length:100%_auto] bg-top bg-no-repeat blur-[3px] opacity-30"></div>
                            <div class="absolute inset-0 bg-gradient-to-b from-[#0B0E14]/20 to-[#161A23]"></div>
                        </div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-start mb-6">
                                <div id="det-badge" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-white text-[10px] font-extrabold tracking-wider bg-blue-600">
                                    <svg id="det-badge-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    <span id="det-time-text" class="live-timer-text" data-start="" data-end="">Loading...</span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-[10px] font-bold text-textDim uppercase tracking-wider">PRIZE POOL</span>
                                    <span id="det-prize" class="block text-xl font-black text-ictexGreen"></span>
                                </div>
                            </div>
                            <h2 id="det-title" class="text-2xl font-bold text-white mb-2"></h2>
                        </div>
                    </div>
                    
                    <div id="det-action-area" class="bg-btnAreaBg p-4 border-t border-white/5 relative z-20">
                        <button id="det-join-btn" class="w-full py-3.5 rounded-lg bg-ictexGreen hover:bg-[#0aa645] text-white font-bold text-[15px] shadow-lg active:scale-95 transition">
                            Join now — <span id="det-join-fee"></span>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-y-8 gap-x-4 mb-8 px-2 relative">
                    <div class="absolute left-1/2 top-0 bottom-0 w-px bg-white/10 -translate-x-1/2"></div>
                    <div class="flex flex-col gap-6 items-center text-center">
                        <div><span class="block text-[10px] text-textDim font-bold tracking-wider mb-1">UTC+06:00</span><span id="det-start" class="block text-white font-bold text-[14px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">START</span></div>
                        <div><span class="block text-[10px] text-textDim font-bold tracking-wider mb-1">UTC+06:00</span><span id="det-end" class="block text-white font-bold text-[14px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">END</span></div>
                        <div><span id="det-grid-fee" class="block text-white font-bold text-[16px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">ENTRY FEE</span></div>
                        <div><span id="det-grid-duration" class="block text-white font-bold text-[16px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">DURATION</span></div>
                    </div>
                    <div class="flex flex-col gap-6 items-center text-center pt-8">
                        <div><span id="det-grid-prize" class="block text-white font-bold text-[16px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">PRIZE POOL</span></div>
                        <div class="mt-4"><span id="det-grid-rebuys" class="block text-white font-bold text-[16px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">NUMBER OF<br>REBUYS</span></div>
                        <div class="mt-4"><span id="det-grid-rebuy-cost" class="block text-white font-bold text-[16px]"></span><span class="block text-[10px] text-textDim font-bold tracking-wider mt-1">REBUY COST</span></div>
                    </div>
                </div>

                <div class="border-t border-white/10 pt-6">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-[16px] font-bold">Description</h3>
                        <button onclick="openPrizeModal()" class="bg-ictexBlue/10 hover:bg-ictexBlue/20 text-ictexBlue border border-ictexBlue/30 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            View Prizes
                        </button>
                    </div>
                    <p id="det-desc" class="text-textDim text-sm leading-relaxed"></p>
                </div>
            </div>

            <!-- PRIZES TAB -->
            <div id="inner-prizes" class="inner-tab-content">
                <!-- Javascript will inject content here -->
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBUTMFblYIVovOe4F25XCFneJNTlVcoWCA", authDomain: "ictex-trade.firebaseapp.com", databaseURL: "https://ictex-trade-default-rtdb.firebaseio.com", projectId: "ictex-trade" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const database = firebase.database();

        let allTournaments = {};
        let myUID = null;
        let activeUserBalance = 0;
        let isDemoActive = false;
        let liveTimerInterval = null;
        let myUserName = "You";
        let myCountryCode = "un";
        let currentTourId = null;
        const bannerUrl = "https://pub-4c6b2dbf3a0c4862a8964b1546de6283.r2.dev/Ictex/1776985962699_AddText_04_24_05.11.43.jpg";

        // Modal Function
        function showCustomModal(title, message, isSuccess = false) {
            document.getElementById('custom-modal-title').textContent = title;
            document.getElementById('custom-modal-message').innerHTML = message;
            
            const iconDiv = document.getElementById('custom-modal-icon');
            if (isSuccess) {
                iconDiv.className = 'w-16 h-16 mx-auto mb-4 rounded-full bg-ictexGreen/20 text-ictexGreen flex items-center justify-center';
                iconDiv.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else {
                iconDiv.className = 'w-16 h-16 mx-auto mb-4 rounded-full bg-tourRed/20 text-tourRed flex items-center justify-center';
                iconDiv.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }
            
            document.getElementById('custom-modal').classList.add('modal-active');
        }

        function closeCustomModal() {
            document.getElementById('custom-modal').classList.remove('modal-active');
        }

        function openPrizeModal() {
            document.getElementById('prize-modal').classList.add('modal-active');
        }

        function closePrizeModal() {
            document.getElementById('prize-modal').classList.remove('modal-active');
        }

        // Generate consistent fake random number
        function getDeterministicRandom(str1, str2) {
            let hash = 0;
            const combined = String(str1) + String(str2);
            for (let i = 0; i < combined.length; i++) {
                hash = combined.charCodeAt(i) + ((hash << 5) - hash);
            }
            return Math.abs(Math.sin(hash));
        }

        // --- Tabs Logic ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });
        document.querySelectorAll('.inner-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.inner-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.inner-tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.getAttribute('data-target')).classList.add('active');
            });
        });

        // --- User Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const balanceEl = document.getElementById('user-top-balance');
            auth.onAuthStateChanged(user => {
                if (user) {
                    myUID = user.uid;
                    database.ref('users/' + user.uid).on('value', snapshot => {
                        if (snapshot.exists()) {
                            const data = snapshot.val();
                            myUserName = data.name || "You";
                            myCountryCode = data.countryCode ? data.countryCode.toLowerCase() : "un";
                            
                            isDemoActive = localStorage.getItem('isDemoAccount') === 'true';
                            activeUserBalance = (data.realBalance || 0) + (data.bonusBalance || 0);
                            balanceEl.innerHTML = `$${activeUserBalance.toFixed(2)} <span class="text-ictexGreen text-[10px] uppercase ml-1">(Live)</span>`;
                        }
                    });
                }
            });
        });

        // --- Format Timer (Day Hour Min Sec) ---
        function formatCountdown(diff) {
            if (diff < 0) diff = 0;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            if (d > 0) {
                return `${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
            }
            return `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
        }

        function getBadgeData(tour) {
            const now = Date.now();
            if (tour.status === 'completed' || now > tour.endTime) {
                return { text: "FINISHED", bgClass: "bg-tourRed", showIcon: false };
            }
            const startDiff = tour.startTime - now;
            const endDiff = tour.endTime - now;
            
            if (startDiff > 0) {
                return { text: `UNTIL START: ${formatCountdown(startDiff)}`, bgClass: "bg-tourOrange", showIcon: true };
            }
            // Active state (Red Background)
            return { text: `ENDS IN: ${formatCountdown(endDiff)}`, bgClass: "bg-tourRed", showIcon: false };
        }

        function startLiveTimers() {
            if(liveTimerInterval) clearInterval(liveTimerInterval);
            liveTimerInterval = setInterval(() => {
                document.querySelectorAll('.live-timer-text').forEach(el => {
                    const start = parseInt(el.getAttribute('data-start'));
                    const end = parseInt(el.getAttribute('data-end'));
                    const status = el.getAttribute('data-status');
                    if(start && end) {
                        const data = getBadgeData({startTime: start, endTime: end, status: status});
                        el.innerText = data.text;
                        const parent = el.parentElement;
                        parent.className = parent.className.replace(/bg-ictexGreen|bg-tourOrange|bg-tourRed/g, '').trim();
                        parent.classList.add(data.bgClass);
                        const badgeIcon = parent.querySelector('svg');
                        if (badgeIcon) {
                            badgeIcon.style.display = data.showIcon ? 'block' : 'none';
                        }
                    }
                });
            }, 1000);
        }

        function formatDate(ts) {
            const d = new Date(ts);
            const day = String(d.getDate()).padStart(2, '0');
            const month = d.toLocaleString('en-US', { month: 'short' });
            const hours = String(d.getHours()).padStart(2, '0');
            const mins = String(d.getMinutes()).padStart(2, '0');
            return `${day} ${month} ${hours}:${mins}`;
        }

        // --- Fetch & Render Leaderboard Data from Firebase ---
        function listenToTournamentLeaderboard(tourId, tour, isJoined) {
            const prizesTab = document.getElementById('inner-prizes');
            
            const diff = tour.startTime - Date.now();
            const isActive = diff <= 0 && tour.status === 'active';
            const isCompleted = tour.status === 'completed' || Date.now() > tour.endTime;

            // Only show leaderboard if joined AND (active OR completed)
            const showLeaderboard = isJoined && (isActive || isCompleted);

            if (!showLeaderboard) {
                prizesTab.innerHTML = `
                    <div class="flex flex-col items-center justify-center pt-24 pb-10 text-center">
                        <svg class="w-12 h-12 opacity-20 mb-4 text-textDim" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        <h3 class="text-white font-semibold text-lg tracking-wide">Leaderboard unavailable</h3>
                        <p class="text-textDim text-sm mt-2 px-6">Join the tournament to view live rankings once it starts.</p>
                    </div>`;
                return;
            }

            prizesTab.innerHTML = `<div class="text-center py-10 text-textDim animate-pulse">Loading Leaderboard...</div>`;

            database.ref(`tournaments/${tourId}/leaderboard`).on('value', snap => {
                if(document.getElementById('view-details').classList.contains('hidden') || currentTourId !== tourId) return;
                
                let participantsHTML = '';

        // --- Details UI Updater ---

            timeEl.setAttribute('data-end', tour.endTime);

                if (isJoined) {

                        newJoinBtn.innerText = "Trade";

        function openDetails(tourId) {
            currentTourId = tourId;

        async function handleJoin() {
            if(!myUID || !currentTourId) return;

            if(isDemoActive) {
                showCustomModal('Action Denied', 'Tournaments can only be joined using a <b>Live account</b>. Please switch to your real balance to participate.', false);
                return;
            }

            const tour = allTournaments[currentTourId];
            const fee = parseFloat(tour.fee);

            if (fee > 0) {
                if (activeUserBalance < fee) {
                    window.parent.postMessage({
                        type: 'SHOW_INSUFFICIENT_FUNDS',
                        tourName: tour.title,
                        fee: fee,
                        balance: activeUserBalance
                    }, '*');
                    return;
                }
                await database.ref(`users/${myUID}/realBalance`).set(firebase.database.ServerValue.increment(-fee));
            }

            const initialBal = parseFloat(tour.initialBalance || 100);
            await database.ref(`tournaments/${currentTourId}/participants/${myUID}`).set({ 
                joinedAt: Date.now(),
                isBot: false,
                tourBalance: initialBal
            });
            closeDetails();
            showCustomModal('Success!', 'You have successfully joined the tournament. Good luck!', true);
        }

        // --- NEW REBUY LOGIC ---
        async function handleRebuy() {
            if (!myUID || !currentTourId) return;

            const tour = allTournaments[currentTourId];
            const initialBalance = parseFloat(tour.initialBalance || 100);
            const rebuyCost = parseFloat(tour.rebuyCost || 0);

            try {
                const tourBalanceSnap = await database.ref(`tournaments/${currentTourId}/participants/${myUID}/tourBalance`).once('value');
                const currentTourBalance = tourBalanceSnap.val();

                if (currentTourBalance > initialBalance) {
                    showCustomModal('Rebuy Failed!', `Your tournament balance is <b>$${currentTourBalance.toFixed(2)}</b>.<br><br>Since it is higher than the initial balance (<b>$${initialBalance.toFixed(2)}</b>), you cannot rebuy right now.`, false);
                    return;
                }
                
                if (activeUserBalance < rebuyCost) {
                    window.parent.postMessage({
                        type: 'SHOW_INSUFFICIENT_FUNDS',
                        tourName: tour.title + ' (Rebuy)',
                        fee: rebuyCost,
                        balance: activeUserBalance
                    }, '*');
                    return;
                }

                // Perform rebuy
                const updates = {};
                updates[`/users/${myUID}/realBalance`] = firebase.database.ServerValue.increment(-rebuyCost);
                updates[`/tournaments/${currentTourId}/participants/${myUID}/tourBalance`] = initialBalance;
                
                await database.ref().update(updates);
                
                showCustomModal('Rebuy Successful!', `Your tournament balance has been reset to <b>$${initialBalance.toFixed(2)}</b>.<br>Good luck on your comeback!`, true);
                
            } catch (error) {
                console.error("Rebuy failed:", error);
                showCustomModal('Error', 'An error occurred during rebuy. Please try again.', false);
            }
        }

        function closeDetails() {
            currentTourId = null;
            document.getElementById('view-details').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            document.querySelector('[data-target="inner-info"]').click();
        }
    </script>
</body>
